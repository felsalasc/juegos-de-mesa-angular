<div class="auth-page">
  <div class="auth-card">

    <h1>Iniciar sesión</h1>

    <p class="subtitle">
      Accede a tu cuenta de NortLAB
    </p>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="ingresar()">

      <div class="form-group">

        <label for="email">
          Correo electrónico
        </label>

        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ejemplo@correo.com">

        <small
          class="error"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">

          El correo electrónico es obligatorio.

        </small>

        <small
          class="error"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">

          Ingresa un correo electrónico válido.

        </small>

      </div>

      <div class="form-group">

        <label for="password">
          Contraseña
        </label>

        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Ingresa tu contraseña">

        <small
          class="error"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">

          La contraseña es obligatoria.

        </small>

        <small
          class="error"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">

          La contraseña debe tener al menos 6 caracteres.

        </small>

      </div>

      <div class="botones">

        <button
          type="submit"
          [disabled]="cargando">

          {{ cargando ? 'Ingresando...' : 'Ingresar' }}

        </button>

        <button
          type="button"
          class="limpiar"
          (click)="limpiarFormulario()"
          [disabled]="cargando">

          Limpiar

        </button>

      </div>

      <p
        class="mensaje-error"
        *ngIf="mensaje">

        {{ mensaje }}

      </p>

    </form>

    <div class="links">

      <a routerLink="/registro">
        Crear cuenta
      </a>

      <a routerLink="/recuperar">
        Recuperar contraseña
      </a>

      <a
        routerLink="/inicio"
        class="btn-principal">

        Ir al inicio

      </a>

    </div>

  </div>
</div>
