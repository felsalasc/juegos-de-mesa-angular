<div class="auth-page">
  <div class="auth-card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Accede a tu cuenta de Juegos de Mesa</p>

    <form [formGroup]="loginForm" (ngSubmit)="ingresar()">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ejemplo@correo.com"
        />

        <small class="error" *ngIf="loginForm.controls['email'].touched && loginForm.controls['email'].hasError('required')">
          El correo es obligatorio.
        </small>

        <small class="error" *ngIf="loginForm.controls['email'].touched && loginForm.controls['email'].hasError('email')">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
        />

        <small class="error" *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].hasError('required')">
          La contraseña es obligatoria.
        </small>

        <small class="error" *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].hasError('minlength')">
          La contraseña debe tener al menos 6 caracteres.
        </small>
      </div>

      <button type="submit">Ingresar</button>

      <p class="message" *ngIf="mensaje">{{ mensaje }}</p>
    </form>

    <div class="links">
      <a href="/registro">Crear cuenta</a>
      <a href="/recuperar">Recuperar contraseña</a>
    </div>
  </div>
</div>
