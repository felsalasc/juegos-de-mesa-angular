<div class="auth-page">
  <div class="auth-card">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Ingresa tu correo para recuperar el acceso</p>

    <form [formGroup]="recuperarForm" (ngSubmit)="recuperar()">
      <div class="form-group">
        <label for="email">Correo electrónico</label>

        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ejemplo@correo.com"
        />

        <small class="error" *ngIf="recuperarForm.controls['email'].touched && recuperarForm.controls['email'].hasError('required')">
          El correo es obligatorio.
        </small>

        <small class="error" *ngIf="recuperarForm.controls['email'].touched && recuperarForm.controls['email'].hasError('email')">
          Ingresa un correo válido.
        </small>
      </div>

      <button type="submit">Recuperar contraseña</button>

      <p class="message" [class.ok]="tipoMensaje === 'ok'" *ngIf="mensaje">
        {{ mensaje }}
      </p>
    </form>

    <div class="links">
      <a href="/login">Volver al login</a>
    </div>
  </div>
</div>
