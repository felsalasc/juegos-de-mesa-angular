services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nortlab-web
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nortlab-api
    ports:
      - "3001:3000"
    volumes:
      - ./db.json:/app/db.json